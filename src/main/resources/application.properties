spring.application.name=plateforme-loisirs
# Database propreties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/loisirs?autoreconnect=true&useSSL=false&serverTimezone=Europe/Brussels&useLegacyDatetimeCode=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# jwt
app.jwt.secret=${APP_JWT_SECRET}
  # deployment
#server.address=0.0.0.0
#server.port=${PORT}

# Log level configuration
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.web.resources.static-locations=classpath:/static/
logging.level.root=error
logging.level.be.iccbxl=info
# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

#logging.level.org.springframework.security=DEBUG

# Uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Stripe test mode , pas webhook complet
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
# Stripe pour le frontend
app.frontend-url=${APP_FRONTEND_URL:http://localhost:8080}